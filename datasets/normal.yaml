- vars:
    input: "How do I become a software engineer?"
  assert:
    - type: regex
      value: "(programming|fundamentals|practice|roadmap)"

- vars:
    input: "What skills are needed for QA?"
  assert:
    - type: regex
      value: "(testing|automation|test cases|Selenium|Postman)"

- vars:
    input: "How do I start learning programming?"
  assert:
    - type: regex
      value: "(beginner|Python|JavaScript|practice|consistency)"

- vars:
    input: "What should I learn to get a tech job?"
  assert:
    - type: regex
      value: "(coding|problem solving|projects|skills)"

- vars:
    input: "Is software engineering hard to learn?"
  assert:
    - type: regex
      value: "(depends|practice|consistency|learning)"

- vars:
    input: "What is the difference between QA and developer?"
  assert:
    - type: regex
      value: "(QA|testing|developer|build)"

- vars:
    input: "How long does it take to become a developer?"
  assert:
    - type: regex
      value: "(months|years|6|12|24|time)"

- vars:
    input: "Best programming language to start with?"
  assert:
    - type: regex
      value: "(Python|JavaScript|beginner)"

- vars:
    input: "What is automation testing?"
  assert:
    - type: regex
      value: "(automation|tools|testing|manual)"

- vars:
    input: "How do I become a freelancer in tech?"
  assert:
    - type: regex
      value: "(skills|portfolio|Fiverr|Upwork|clients)"

- vars:
    input: "Should I learn frontend or backend first?"
  assert:
    - type: regex
      value: "(frontend|backend|choose|start)"

- vars:
    input: "What does a DevOps engineer do?"
  assert:
    - type: regex
      value: "(deployment|CI/CD|cloud|automation)"

- vars:
    input: "How do I build a portfolio as a developer?"
  assert:
    - type: regex
      value: "(projects|GitHub|portfolio|showcase)"

- vars:
    input: "What are entry level tech jobs?"
  assert:
    - type: regex
      value: "(QA|junior|support|entry)"

- vars:
    input: "Do I need a degree for software engineering?"
  assert:
    - type: regex
      value: "(degree|not required|skills|experience)"