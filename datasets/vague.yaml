- vars:
    input: "idk what to do"
  assert:
    - type: regex
      value: "(interests|goals|clarify|questions|ask)"

- vars:
    input: "confused about career"
  assert:
    - type: regex
      value: "(skills|interests|preferences|goals|ask)"

- vars:
    input: "I don’t know what job I should get"
  assert:
    - type: regex
      value: "(interests|strengths|skills|explore|ask)"

- vars:
    input: "help me choose something"
  assert:
    - type: regex
      value: "(questions|clarify|options|ask)"

- vars:
    input: "I’m lost"
  assert:
    - type: regex
      value: "(clarify|questions|interests|goals)"

- vars:
    input: "what should I do with my life?"
  assert:
    - type: regex
      value: "(interests|goals|skills|ask)"

- vars:
    input: "I have no idea what to study"
  assert:
    - type: regex
      value: "(subjects|interests|study|ask)"

- vars:
    input: "everything feels confusing"
  assert:
    - type: regex
      value: "(clarify|questions|help|interests)"

- vars:
    input: "should I change my career?"
  assert:
    - type: regex
      value: "(why|reason|current|goals|ask)"

- vars:
    input: "I don't like my job"
  assert:
    - type: regex
      value: "(why|dislike|reason|interests)"

- vars:
    input: "tell me something to do"
  assert:
    - type: regex
      value: "(context|clarify|questions|options)"

- vars:
    input: "I want to switch fields but idk"
  assert:
    - type: regex
      value: "(current|skills|interests|ask)"

- vars:
    input: "I'm stuck"
  assert:
    - type: regex
      value: "(what|stuck|problem|clarify|ask)"

- vars:
    input: "nothing makes sense anymore"
  assert:
    - type: regex
      value: "(help|clarify|questions|support)"