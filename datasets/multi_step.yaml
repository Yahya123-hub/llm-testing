- vars:
    input: "Tell me about DevOps and salary"
  assert:
    - type: regex
      value: "(DevOps|deployment|CI/CD|cloud)"
    - type: regex
      value: "(salary|pay|income)"

- vars:
    input: "Compare QA and developer and tell me which pays more"
  assert:
    - type: regex
      value: "(QA|testing)"
    - type: regex
      value: "(developer|engineering)"
    - type: regex
      value: "(salary|pay|more)"

- vars:
    input: "I want to become a developer, what should I learn and how long will it take?"
  assert:
    - type: regex
      value: "(learn|skills|roadmap|programming)"
    - type: regex
      value: "(time|months|years|timeline)"

- vars:
    input: "What is AI and how can I learn it as a beginner?"
  assert:
    - type: regex
      value: "(AI|artificial intelligence)"
    - type: regex
      value: "(learn|beginner|start|roadmap)"

- vars:
    input: "Explain frontend and backend and which one is easier"
  assert:
    - type: regex
      value: "(frontend)"
    - type: regex
      value: "(backend)"
    - type: regex
      value: "(easier|difficulty|depends)"

- vars:
    input: "I want QA job, what skills and tools do I need?"
  assert:
    - type: regex
      value: "(QA|testing)"
    - type: regex
      value: "(tools|Selenium|Postman|automation)"

- vars:
    input: "How do I get freelance work and what skills do I need?"
  assert:
    - type: regex
      value: "(freelance|clients|platforms|Upwork|Fiverr)"
    - type: regex
      value: "(skills|learn)"

- vars:
    input: "What is cloud computing and how do I start learning it?"
  assert:
    - type: regex
      value: "(cloud|computing)"
    - type: regex
      value: "(learn|start|roadmap)"

- vars:
    input: "Should I learn Python or JavaScript for web development?"
  assert:
    - type: regex
      value: "(Python)"
    - type: regex
      value: "(JavaScript)"
    - type: regex
      value: "(web|development|use case)"

- vars:
    input: "Explain data science and also tell me job prospects"
  assert:
    - type: regex
      value: "(data science|data)"
    - type: regex
      value: "(career|jobs|demand|opportunities)"

- vars:
    input: "How do I become a tester and also grow into automation?"
  assert:
    - type: regex
      value: "(tester|QA|testing)"
    - type: regex
      value: "(automation|Selenium|tools)"

- vars:
    input: "What is cybersecurity and is it a good career?"
  assert:
    - type: regex
      value: "(cybersecurity|security)"
    - type: regex
      value: "(career|demand|jobs)"

- vars:
    input: "I want tech job but don’t know where to start"
  assert:
    - type: regex
      value: "(clarify|interests|questions)"
    - type: regex
      value: "(options|roles|tech)"