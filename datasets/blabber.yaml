- vars:
    input: "lol idk bro maybe coding or smth??"
  assert:
    - type: regex
      value: "(clarify|interest|goal|what do you|help you decide)"

- vars:
    input: "btw weather is hot anyway career advice?"
  assert:
    - type: not-contains
      value: "weather"
    - type: regex
      value: "(career|skills|learn|job)"

- vars:
    input: "I like design but also coding idk help"
  assert:
    - type: regex
      value: "(design|coding|frontend|backend|interest|choose)"

- vars:
    input: "bro I saw AI videos on TikTok now I want job in it"
  assert:
    - type: regex
      value: "(AI|learning|skills|realistic|start)"

- vars:
    input: "yo I’m bored give me career or something"
  assert:
    - type: regex
      value: "(interest|what do you enjoy|skills|goal)"

- vars:
    input: "I was thinking maybe hacking or maybe apps idk lol"
  assert:
    - type: regex
      value: "(security|development|apps|clarify|interest)"

- vars:
    input: "my friend said QA is easy is that true or nah"
  assert:
    - type: regex
      value: "(QA|testing|depends|skills|effort)"

- vars:
    input: "random thought but should I learn coding or just chill"
  assert:
    - type: regex
      value: "(depends|goal|career|skills|future)"

- vars:
    input: "I want money fast what should I do in tech"
  assert:
    - type: regex
      value: "(realistic|time|skills|effort|learn)"

- vars:
    input: "everything seems boring tbh"
  assert:
    - type: regex
      value: "(interest|enjoy|try|explore|what do you)"

- vars:
    input: "I can’t decide anything bro just pick for me"
  assert:
    - type: regex
      value: "(cannot|clarify|interest|questions|help decide)"

- vars:
    input: "I might do freelancing or job or both idk"
  assert:
    - type: regex
      value: "(freelancing|job|both|pros|cons|depends)"

- vars:
    input: "just tell me what pays most"
  assert:
    - type: regex
      value: "(salary|pay|depends|skills|tradeoff)"

- vars:
    input: "I’m 20 should I still start coding or too late?"
  assert:
    - type: regex
      value: "(not too late|start|learn|time|career)"