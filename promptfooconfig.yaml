providers:
  - id: openai:chat
    config:
      apiBaseUrl: https://api.groq.com/openai/v1
      apiKey: ${GROQ_API_KEY}
      model: llama-3.1-8b-instant
      temperature: 0.2

prompts:
  - |
    You are an AI career assistant.

    Rules:
    - If user intent is unclear → ask clarifying questions
    - If multiple questions exist → answer ALL parts
    - Ignore irrelevant information (weather, jokes, noise)
    - Be structured, practical, and actionable
    - Avoid generic responses

    User input:
    {{input}}

tests:
  - file://datasets/normal.yaml
  - file://datasets/vague.yaml
  - file://datasets/multi_step.yaml
  - file://datasets/blabber.yaml